<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>404 - Not Found</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap');

        :root {
            --bg-color: #050505;
            --text-color: #ffffff;
            --accent-color: #4ade80;
            --text-muted: rgba(255, 255, 255, 0.4);
        }

        /* Mobile: only lock touch-action on the game area, NOT on the whole page */
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            -webkit-user-select: none;
            user-select: none;
            background-color: var(--bg-color);
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 1rem;
            box-sizing: border-box;
            z-index: 10;
        }

        h1 {
            font-size: 6rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 2rem;
            margin-top: -10px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .game-container {
            margin: 2rem auto;
            position: relative;
            background: rgba(15, 15, 15, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.4);
            width: fit-content;
            max-width: 100%;
            box-sizing: border-box;
            touch-action: none;
            cursor: pointer;
        }

        canvas {
            background-color: transparent;
            display: block;
            border-bottom: 2px solid rgba(255, 255, 255, 0.2);
            image-rendering: pixelated;
            max-width: 100%;
        }

        #score-board {
            position: absolute;
            top: 25px;
            right: 30px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: bold;
        }

        .instructions {
            margin-top: 10px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .explanation {
            margin-top: 1.5rem;
            font-size: 0.95rem;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.7);
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .home-btn {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 100;
        }

        .home-btn:hover {
            background: rgba(74, 222, 128, 0.1);
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.3);
        }

        @media (max-width: 650px) {
            h1 {
                font-size: 4rem;
            }

            h2 {
                font-size: 1.2rem;
            }

            .game-container {
                padding: 10px;
                margin: 1rem auto;
            }

            #score-board {
                top: 12px;
                right: 20px;
                font-size: 0.9rem;
            }

            .instructions {
                font-size: 0.65rem;
            }

            .explanation {
                font-size: 0.85rem;
            }
        }

        .bg-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="container">
        <h1>404</h1>
        <h2>System Error</h2>

        <div class="game-container" id="game-click-area">
            <div id="score-board">HI: 0 | 0</div>
            <canvas id="gameCanvas" width="600" height="150"></canvas>
            <div class="instructions">CLICK OR TAP ANYWHERE TO START JUMPING</div>
        </div>

        <p class="explanation">
            The resource you requested could not be found.
            It might have been removed, renamed, or did not exist in the first place.
        </p>

        <a href="/" class="home-btn">Return to Simulation</a>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreBoard = document.getElementById('score-board');
        const gameArea = document.getElementById('game-click-area');

        // Safe localStorage
        let highScore = 0;
        try {
            highScore = parseInt(localStorage.getItem('dinoHighScore')) || 0;
        } catch (e) {
            console.warn("Storage access denied");
        }

        // IMPORTANT: Declare all game state BEFORE resize(), otherwise
        // on mobile screens resize() triggers and accesses these variables
        // before they exist (temporal dead zone), crashing the entire script.
        let isPlaying = false, isGameOver = false, score = 0, gamespeed = 5, timer = 0;
        const dino = { x: 40, y: 100, w: 20, h: 20, vy: 0, g: 0.6, p: -10, jump: false, ground: 100 };
        const obstacles = [];

        function resize() {
            const width = Math.min(600, window.innerWidth - 40);
            if (canvas.width !== width) {
                canvas.width = width;
                if (!isPlaying) initDraw();
            }
        }
        window.addEventListener('resize', resize);

        function initDraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.moveTo(0, 120); ctx.lineTo(canvas.width, 120); ctx.stroke();
            ctx.fillStyle = '#4ade80'; ctx.fillRect(dino.x, dino.ground, dino.w, dino.h);
            ctx.fillStyle = '#000'; ctx.fillRect(dino.x + 12, dino.ground + 4, 4, 4);
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Inter'; ctx.textAlign = 'center';
            ctx.fillText('START GAME', canvas.width / 2, 75);
        }

        function gameLoop() {
            if (!isPlaying) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.beginPath(); ctx.moveTo(0, 120); ctx.lineTo(canvas.width, 120); ctx.stroke();

            // Dino logic
            dino.vy += dino.g; dino.y += dino.vy;
            if (dino.y > dino.ground) { dino.y = dino.ground; dino.vy = 0; dino.jump = false; }
            ctx.fillStyle = '#4ade80'; ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
            ctx.fillStyle = '#000'; ctx.fillRect(dino.x + 12, dino.y + 4, 4, 4);

            // Obstacles
            timer++;
            if (timer > (100 - gamespeed * 2) + Math.random() * 50) {
                obstacles.push({ x: canvas.width, w: 15 + Math.random() * 10, h: 20 + Math.random() * 20 });
                timer = 0;
            }
            ctx.fillStyle = '#ff4444';
            for (let i = obstacles.length - 1; i >= 0; i--) {
                const o = obstacles[i];
                o.x -= gamespeed;
                ctx.fillRect(o.x, 120 - o.h, o.w, o.h);
                if (dino.x < o.x + o.w && dino.x + dino.w > o.x && dino.y < 120 && dino.y + dino.h > 120 - o.h) {
                    gameOver();
                }
                if (o.x + o.w < 0) obstacles.splice(i, 1);
            }

            score += 0.05; gamespeed += 0.001;
            if (score > highScore) highScore = score;
            scoreBoard.innerText = `HI: ${Math.floor(highScore)} | ${Math.floor(score)}`;

            if (!isGameOver) requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isGameOver = true; isPlaying = false;
            try { localStorage.setItem('dinoHighScore', Math.floor(highScore)); } catch (e) { }
            ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#fff'; ctx.font = '20px Inter'; ctx.textAlign = 'center';
            ctx.fillText('GAME OVER', canvas.width / 2, 70);
            ctx.fillStyle = '#4ade80'; ctx.font = '12px JetBrains Mono';
            ctx.fillText('CLICK TO RESTART', canvas.width / 2, 100);
        }

        function triggerAction(e) {
            if (e && e.target && (e.target.tagName === 'A' || e.target.closest('a'))) return;
            if (isGameOver) {
                obstacles.length = 0; score = 0; gamespeed = 5; isGameOver = false; isPlaying = true; gameLoop();
            } else if (!isPlaying) {
                isPlaying = true; gameLoop();
            } else if (!dino.jump) {
                dino.vy = dino.p; dino.jump = true;
            }
        }

        // Broad event listeners for mobile robustness and desktop
        window.addEventListener('mousedown', triggerAction);
        window.addEventListener('touchstart', function (e) {
            // Safely check if target is a link
            var t = e.target;
            while (t) {
                if (t.tagName === 'A') return; // let links navigate normally
                t = t.parentElement;
            }
            e.preventDefault(); // prevent double-firing with mousedown
            triggerAction(null);
        }, { passive: false });
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'ArrowUp') {
                e.preventDefault();
                triggerAction();
            }
        });

        resize(); // called here (after all declarations) to avoid temporal dead zone on mobile
        initDraw();
    </script>
</body>

</html>
